# ─────────────────────────────────────────────────────────────────────────────
#  baard — render.yaml
#  Defines the entire infrastructure: web service + PostgreSQL database.
#
#  How to deploy:
#  1. Push this repo to GitHub
#  2. In Render Dashboard → New → Blueprint Instance → connect your repo
#  3. Set the environment variables marked "sync: false" (see below)
#  4. Deploy — Render provisions the DB and launches the server automatically
#
#  Docs: https://render.com/docs/infrastructure-as-code
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: baard
    runtime: node
    plan: free                        # upgrade to starter for always-on
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true                  # deploys on every push to main

    envVars:
      - key: NODE_ENV
        value: production

      # Injected automatically from the database below
      - key: DATABASE_URL
        fromDatabase:
          name: baard-db
          property: connectionString

      # Auto-generated secure random string (no action needed)
      - key: JWT_SECRET
        generateValue: true

      # Set these manually in Render Dashboard → Environment after first deploy
      - key: APP_URL
        value: https://baard.cc         # ← update to your actual domain

      - key: GOOGLE_CLIENT_ID
        sync: false                     # set in Render Dashboard

      - key: GOOGLE_CLIENT_SECRET
        sync: false                     # set in Render Dashboard

      # Optional: Cloudflare Worker relay URL
      - key: RELAY_URL
        sync: false

databases:
  - name: baard-db
    databaseName: baard
    plan: free                          # Render free PostgreSQL (90-day expiry on free plan)
    # Upgrade to starter ($7/mo) for persistent production DB
